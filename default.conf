# Nginx acts as the single entry point for the application.
# It routes incoming requests to either the React frontend or the Django backend
# based on the URL path prefix — a standard reverse proxy pattern for containerized apps.
server {
    # Listen on port 80 for both IPv4 and IPv6 traffic.
    # "default_server" means this block handles requests that don't match any other server block.
    listen 80 default_server;
    listen [::]:80 default_server;

    # Default file to serve when a directory is requested.
    index index.html;

    # Route all requests beginning with /api/ to the Django backend container.
    # "backend" resolves via Docker's internal DNS to the backend service defined in docker-compose.yml.
    # The forwarded headers preserve the original client's host and IP,
    # which Django needs to correctly build absolute URLs and log real client addresses.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the React SPA for all other requests.
    # Files are served from the directory where the production build (npm run build) is copied.
    # try_files first looks for an exact file match on disk ($uri),
    # then falls back to index.html — this allows React Router to handle
    # client-side routes like /tasks/5 that have no corresponding file on disk.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}